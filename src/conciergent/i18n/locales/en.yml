line:
  oauth:
    alt: Authorize
    header: Authorize
    body: Tap the button below to authorize. Come back to this chat once authorization is complete.
    welcome_body: Welcome! Tap the button below to authorize, then come back to start chatting.
    button: Authorize

discord:
  oauth:
    header: Authorize
    body: Tap the button below to authorize. Come back to this chat once authorization is complete.
    button: Authorize

slack:
  oauth:
    notification: Authorize to continue.
    header: Authorize
    body: Tap the button below to authorize. Come back to this conversation once authorization is complete.
    button: Authorize
  # Browser page shown after a Slack workspace install completes, in the user's Accept-Language.
  install:
    completed:
      title: Installation completed
      body: The assistant has been added to {workspace}. You can close this tab.
    failed:
      title: Installation failed
      body: Something went wrong. Please try installing again.
  interaction:
    processing: "⏳ Processing: {label}"
    selected: "✓ Selected: {label}"

# Browser page shown when an in-chat OAuth authorization returns.
callback:
  completed:
    title: Authorization completed
    body: Close this tab and return to the conversation to continue.
  failed:
    title: Authorization failed
    body: Return to the conversation and try again.

greeting:
  ready: Authorization complete! Ask me anything to get started.
  welcome_back: Welcome back! Ask me anything, anytime.

approval:
  header: Confirm
  body: 'I am about to "{tools}". This action may not be undone. Confirm to proceed.'
  confirm: Confirm
  cancel: Cancel
