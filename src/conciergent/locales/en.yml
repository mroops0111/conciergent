# The in-chat human-in-the-loop confirmation, shown before a destructive tool runs.
approval:
  header: Confirm
  body: 'I am about to "{tools}". This action may not be undone. Confirm to proceed.'
  confirm: Confirm
  cancel: Cancel

# The in-chat OAuth prompt pushed into the conversation, shared by every surface.
authorization:
  header: Authorization needed
  button: Authorize

slack:
  processing: Working on it...

line:
  welcome: Hi! Send me a message to get started.
  ready: You are all set. Send me a message to get started.

# The browser page shown when a Slack workspace install completes, rendered in the user's Accept-Language.
install:
  completed_title: Installed
  completed_body: You can close this window.
  failed_title: Installation failed
  failed_body: Something went wrong. Please try installing again.

# The browser page shown when an in-chat OAuth authorization returns.
callback:
  completed_title: Authorized
  completed_body: You can close this window and return to the conversation.
  failed_title: Authorization failed
  failed_body: Return to the conversation and try again.
