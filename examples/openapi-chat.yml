# The headline demo: an OpenAPI spec straight to a chatbot, in one file.
#
# conciergent embeds openapi-mcp-gateway in-process (needs the [gateway] extra), serves the
# Swagger Petstore spec as MCP tools at /petstore/mcp, and points the agent back at itself.
# The result is a Slack bot that can look up and manage pets by calling the REST API.
#
# Prerequisites:
#   uv add "conciergent[gateway]"                      # or use the bundled docker compose
#   export OPENAI_API_KEY=sk-...                        # the model above reads this key from the env
#   export SLACK_SIGNING_SECRET=...  SLACK_BOT_TOKEN=xoxb-...
#   Redis on localhost:6379 and Postgres on localhost/conciergent (docker compose brings both up)
#
# Register the Slack app from examples/slack-app-manifest.yml, point its URLs at your public
# host (a cloudflared/ngrok tunnel in front of port 8000 for local dev), then: conciergent run

server:
  host: ${CONCIERGENT_HOST:-127.0.0.1}   # docker compose sets this to 0.0.0.0
  port: 8000
  # url: https://your-public-url         # the public URL Slack reaches; set this behind a tunnel or proxy

agent:
  model: openai:gpt-4o-mini        # or any google: or anthropic: model
  system_prompt: |
    You are the Petstore concierge. Use the tools to look up pets by status,
    fetch a pet by id, and place or cancel store orders. Confirm before you change anything.

surface:
  slack:
    enabled: true
    signing_secret: ${SLACK_SIGNING_SECRET}
    bot_token: ${SLACK_BOT_TOKEN}

store:
  messages_url: ${CONCIERGENT_MESSAGES_URL:-redis://localhost:6379/0}
  credentials_url: ${CONCIERGENT_CREDENTIALS_URL:-postgresql+asyncpg://localhost/conciergent}

gateway:
  enabled: true
  specs:
    - name: petstore
      spec: https://petstore3.swagger.io/api/v3/openapi.json
      base_url: https://petstore3.swagger.io/api/v3
