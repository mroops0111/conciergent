# A fully commented conciergent configuration.
# Required fields are uncommented; every commented line shows its shipped default, so you only
# uncomment what you want to change. Secrets come from the environment via ${VAR} or ${VAR:-default}.

agent:
  model: gemini-3-flash
  system_prompt: |
    You are a helpful assistant. Use your tools to answer the user's requests.
  mcp_servers:
    - http://localhost:8000/mcp
  # input_token_limit: 1048576      # set to enable history compaction; unset means no compaction
  # mcp_read_timeout_seconds: 120   # how long one MCP tool call may run
  # client_name: Acme Assistant     # name shown on the MCP OAuth screen; defaults to conciergent

slack:
  signing_secret: ${SLACK_SIGNING_SECRET}
  # A single-workspace bot only needs bot_token. For multi-workspace install, set client_id/secret
  # and point the Slack app's redirect at {server.url}/oauth/slack/callback.
  bot_token: ${SLACK_BOT_TOKEN:-}
  # client_id: ${SLACK_CLIENT_ID:-}
  # client_secret: ${SLACK_CLIENT_SECRET:-}
  # brand_color: '#586af2'
  # destructive_color: '#DC3545'
  # api_timeout_seconds: 30

# line:
#   channel_secret: ${LINE_CHANNEL_SECRET}
#   channel_access_token: ${LINE_CHANNEL_ACCESS_TOKEN}
#   brand_color: '#586af2'
#   destructive_color: '#DC3545'
#   api_timeout_seconds: 30

# UI text (buttons, prompts, greetings) is not configured here, it lives in a locale catalog so it can be translated,
# and conciergent picks the language from each user's Slack/LINE profile.
# To rebrand text or add a language, point at a directory of {lang}.yml files whose keys override the shipped catalog.
# See examples/locales/zh-TW.yml alongside this file.
# locales_dir: ./locales

# conversation:
#   approval_ttl_seconds: 600       # how long a pending approval waits for a decision
#   history_ttl_seconds: 604800     # how long conversation history is retained (one week)
#   oauth_wait_timeout_seconds: 240 # how long an in-chat OAuth handoff blocks

# store:
#   type: memory                    # memory | redis | postgres | composite
#   # url: redis://localhost:6379/0             # for redis or postgres
#   # messages: redis://localhost:6379/0        # composite: expiring message-bearing state
#   # credentials: postgresql+asyncpg://localhost/conciergent  # composite: durable tokens
#   max_turns: 10

# gateway:                          # optional: embed openapi-mcp-gateway so a spec becomes MCP tools
#   specs:
#     - name: petstore
#       spec: ./petstore.json

server:
  host: 127.0.0.1
  port: 8300
  # url: https://your-public-url    # the public URL external services reach; defaults from host/port
