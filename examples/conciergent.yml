# A conciergent configuration, deep-merged over the shipped defaults.
# Set what you need; commented lines show the shipped default.
# Secrets come from the environment via ${VAR} or ${VAR:-default}, and a surface runs only when its `enabled` is true.

server:
  host: 127.0.0.1                   # 0.0.0.0 to accept connections from other hosts
  port: 8000
  # url: https://your-public-url    # the public URL external services reach; defaults from host/port

agent:
  model: gpt-4o-mini
  system_prompt: |
    You are a helpful assistant. Use your tools to answer the user's requests.
  mcp_servers:
    - http://localhost:9000/mcp
  # input_token_limit: 1048576      # override the auto-detected context window; unset auto-detects per model
  # mcp_read_timeout_seconds: 120
  # client_name: conciergent        # name shown on the MCP OAuth screen

surface:
  slack:
    enabled: true
    signing_secret: ${SLACK_SIGNING_SECRET}
    # bot_token: ${SLACK_BOT_TOKEN:-}         # a single-workspace bot only needs this
    # client_id: ${SLACK_CLIENT_ID:-}         # set client_id/secret for the multi-workspace install flow
    # client_secret: ${SLACK_CLIENT_SECRET:-}
    # brand_color: '#586af2'
    # destructive_color: '#DC3545'
    # api_timeout_seconds: 30
  line:
    enabled: false
    # channel_secret: ${LINE_CHANNEL_SECRET}
    # channel_access_token: ${LINE_CHANNEL_ACCESS_TOKEN}
    # brand_color: '#586af2'
    # destructive_color: '#DC3545'
    # api_timeout_seconds: 30

# Message-bearing state (history, approvals, dedupe, OAuth handoff) expires on Redis,
# while long-lived credentials (MCP and bot tokens) live in Postgres and survive restarts.
store:
  messages_url: ${CONCIERGENT_MESSAGES_URL:-redis://localhost:6379/0}
  credentials_url: ${CONCIERGENT_CREDENTIALS_URL:-postgresql+asyncpg://localhost/conciergent}
  # max_turns: 10                   # how many recent turns to keep in history

gateway:
  enabled: false
  # specs:                          # embed openapi-mcp-gateway so a spec becomes MCP tools
  #   - name: petstore
  #     spec: ./petstore.json

# conversation:
#   approval_ttl_seconds: 600       # how long a pending approval waits for a decision
#   history_ttl_seconds: 604800     # how long conversation history is retained (one week)
#   oauth_wait_timeout_seconds: 240 # how long an in-chat OAuth handoff blocks

# logger:
#   level: INFO                     # DEBUG, INFO, WARNING, ERROR, CRITICAL
#   format: text                    # text or json (one JSON object per line)
#   file: ./conciergent.log         # also write to this file, in addition to stderr

# UI text (buttons, prompts, greetings) is not configured here, it lives in a locale catalog so it can be translated,
# and conciergent picks the language from each user's Slack/LINE profile.
# To rebrand text or add a language, point at a directory of {lang}.yml files whose keys override the shipped catalog.
# See examples/locales/en.yml alongside this file.
# locales_dir: ./locales
