# An example locale override, holding the shipped English defaults so you can edit any line to rebrand it.
# Only the keys you keep here override the catalog; delete the rest and they stay on the shipped text.
# Add another file like zh-TW.yml in this directory to translate, and point config at it with
# `locales_dir: ./examples/locales`. conciergent picks each user's language from their Slack or LINE profile.

# The in-chat OAuth prompt pushed into a LINE conversation.
line:
  oauth:
    alt: Authorize
    header: Authorize
    body: Tap the button below to authorize. Come back to this chat once authorization is complete.
    welcome_body: Welcome! Tap the button below to authorize, then come back to start chatting.
    button: Authorize

slack:
  # The in-chat OAuth prompt pushed into a Slack conversation.
  oauth:
    notification: Authorize to continue.
    header: Authorize
    body: Tap the button below to authorize. Come back to this conversation once authorization is complete.
    button: Authorize
  # The browser page shown when a Slack workspace install completes.
  install:
    completed:
      title: Installation completed
      body: The assistant has been added to {workspace}. You can close this tab.
    failed:
      title: Installation failed
      body: Something went wrong. Please try installing again.

# The browser page shown when an in-chat OAuth authorization returns.
callback:
  completed:
    title: Authorization completed
    body: Close this tab and return to the conversation to continue.
  failed:
    title: Authorization failed
    body: Return to the conversation and try again.

# The greeting sent when a user adds the bot, depending on whether a pending authorization just completed.
follow:
  ready: You're all set! Ask me anything to get started.
  welcome_back: Welcome back! Ask me anything, anytime.

# The in-chat human-in-the-loop confirmation, shown before a destructive tool runs.
approval:
  header: Confirm
  body: 'I am about to "{tools}". This action may not be undone. Confirm to proceed.'
  confirm: Confirm
  cancel: Cancel

# The two-phase status shown on a suggestion button after the user taps it.
interaction:
  processing: "⏳ Processing: {label}"
  selected: "✓ Selected: {label}"
