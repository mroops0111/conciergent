# Brings up Redis, Postgres, and conciergent together.
#
#   cp examples/openapi-chat.yml manifest.yml
#   export SLACK_SIGNING_SECRET=...  SLACK_BOT_TOKEN=xoxb-...  OPENAI_API_KEY=sk-...
#   docker compose up
#
# The app serves on http://localhost:8000. Put a tunnel in front of that port,
# and paste its URL into your Slack app and into server.url in manifest.yml to receive events.

services:
  redis:
    image: redis:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: conciergent
      POSTGRES_PASSWORD: conciergent
      POSTGRES_DB: conciergent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conciergent"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      CONCIERGENT_HOST: 0.0.0.0
      CONCIERGENT_MESSAGES_URL: redis://redis:6379/0
      CONCIERGENT_CREDENTIALS_URL: postgresql+asyncpg://conciergent:conciergent@postgres/conciergent
      # Model provider key, set the one your agent.model uses.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Slack surface, set these when surface.slack.enabled.
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      # LINE surface, set these when surface.line.enabled.
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      # Your manifest.yml may reference more env than the keys above,
      # for example a gateway spec's GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET,
      # so add those here or in a local docker-compose.override.yml you keep out of git.
    volumes:
      - ./manifest.yml:/home/app/manifest.yml:ro
